AWSTemplateFormatVersion: '2010-09-09'
Description: >
  DemoWP WordPress deployment (Prod + Lab) across 2 AZs with Auto Scaling, ALB, Multi-AZ RDS, and CloudWatch logging.

Parameters:
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: test-key-01
  DBUsername:
    Type: String
    Default: administrator
  DBPassword:
    Type: String
    NoEcho: true

Resources:

  # ---------------- VPC ----------------
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: DemoWP-VPC

  IGW:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: DemoWP-IGW

  AttachIGW:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref IGW

  RouteTablePublic:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  RoutePublic:
    Type: AWS::EC2::Route
    DependsOn: AttachIGW
    Properties:
      RouteTableId: !Ref RouteTablePublic
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref IGW

  NatEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    DependsOn:
      - AttachIGW
      - PublicSubnetA
    Properties:
      AllocationId: !GetAtt NatEIP.AllocationId
      SubnetId: !Ref PublicSubnetA

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnetARoute:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetA
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnetBRoute:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetB
      RouteTableId: !Ref PrivateRouteTable

  # ---------------- Subnets ----------------
  # Public subnets for Prod
  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.0.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true

  # Private subnets for Lab
  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: false

  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: false

  # Subnet associations
  PublicSubnetARoute:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref RouteTablePublic

  PublicSubnetBRoute:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref RouteTablePublic

  # ---------------- Security Groups ----------------
  ALBSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref VPC
      GroupDescription: ALB Security Group
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
  
  WebSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref VPC
      GroupDescription: Prod and Lab Web SG
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref ALBSG
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  DBSGProd:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref VPC
      GroupDescription: Prod DB SG
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref WebSG

  DBSGLab:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref VPC
      GroupDescription: Lab DB SG
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref WebSG

  # ---------------- IAM Role for EC2 ----------------
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role

  # ---------------- RDS Instances ----------------
  DBSubnetGroupProd:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Prod Multi-AZ
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB

  DBProd:
    Type: AWS::RDS::DBInstance
    Properties:
      DBName: prod_wordpress
      Engine: mysql
      EngineVersion: '8.0'
      DBInstanceClass: db.t3.small
      AllocatedStorage: 100
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      MultiAZ: true
      DBSubnetGroupName: !Ref DBSubnetGroupProd
      VPCSecurityGroups:
        - !Ref DBSGProd
      DeletionProtection: false
      BackupRetentionPeriod: 1

  DBSubnetGroupLab:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Lab Multi-AZ
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB

  DBLab:
    Type: AWS::RDS::DBInstance
    Properties:
      DBName: lab_wordpress
      Engine: mysql
      EngineVersion: '8.0'
      DBInstanceClass: db.t3.micro
      AllocatedStorage: 20
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      MultiAZ: true
      DBSubnetGroupName: !Ref DBSubnetGroupLab
      VPCSecurityGroups:
        - !Ref DBSGLab
      DeletionProtection: false
      BackupRetentionPeriod: 1

  # ---------------- ALBs ----------------
  ALBProd:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: prod-alb
      Subnets:
        - !Ref PublicSubnetA
        - !Ref PublicSubnetB
      SecurityGroups:
        - !Ref ALBSG
      Scheme: internet-facing
      Type: application

  TargetGroupProd:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: prod-tg
      VpcId: !Ref VPC
      Port: 80
      Protocol: HTTP
      TargetType: instance
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 5
      UnhealthyThresholdCount: 5
      Matcher:
        HttpCode: 200-403

  ListenerProd:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALBProd
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroupProd

  ALBLab:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: lab-alb
      Subnets:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB
      SecurityGroups:
        - !Ref ALBSG
      Scheme: internal
      Type: application

  TargetGroupLab:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: lab-tg
      VpcId: !Ref VPC
      Port: 80
      Protocol: HTTP
      TargetType: instance
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 5
      UnhealthyThresholdCount: 5
      Matcher:
        HttpCode: 200-403

  ListenerLab:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALBLab
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroupLab

  # ---------------- Launch Templates ----------------
  LaunchTemplateProd:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: prod-lt
      LaunchTemplateData:
        InstanceType: t3.small
        KeyName: !Ref KeyName
        SecurityGroupIds:
          - !Ref WebSG
        IamInstanceProfile:
          Name: !Ref InstanceProfile
        ImageId: ami-0c02fb55956c7d316
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            yum update -y
            amazon-linux-extras enable php8.2
            yum clean metadata
            yum install -y httpd php php-mysqlnd wget mysql amazon-cloudwatch-agent
            systemctl enable httpd
            systemctl start httpd
            sleep 30
            SECONDS=0
            TIMEOUT=600  # 10 minutes
            until mysqladmin ping -h ${DBProd.Endpoint.Address} --silent; do
              if [ $SECONDS -ge $TIMEOUT ]; then
                echo "RDS not responding in 10 minutes, exiting"
                exit 1
              fi
              sleep 10
            done
                        cd /var/www/html
            wget https://wordpress.org/latest.tar.gz
            tar -xzf latest.tar.gz --strip-components=1
            cat > wp-config.php <<EOF
            <?php
            define('DB_NAME', 'prod_wordpress');
            define('DB_USER', '${DBUsername}');
            define('DB_PASSWORD', '${DBPassword}');
            define('DB_HOST', '${DBProd.Endpoint.Address}');
            define('DB_CHARSET', 'utf8');
            define('DB_COLLATE', '');

            \$table_prefix = 'wp_';

            if ( !defined('ABSPATH') )
                define('ABSPATH', __DIR__ . '/');

            require_once ABSPATH . 'wp-settings.php';
            EOF
            chmod -R 755 /var/www/html
            chown -R apache:apache /var/www/html
            sed -i 's/AllowOverride None/AllowOverride All/' /etc/httpd/conf/httpd.conf
            rm -f /var/www/html/index.html
            systemctl restart httpd

  LaunchTemplateLab:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: lab-lt
      LaunchTemplateData:
        InstanceType: t3.micro
        KeyName: !Ref KeyName
        SecurityGroupIds:
          - !Ref WebSG
        IamInstanceProfile:
          Name: !Ref InstanceProfile
        ImageId: ami-0c02fb55956c7d316
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            yum update -y
            amazon-linux-extras enable php8.2
            yum clean metadata
            yum install -y httpd php php-mysqlnd wget mysql amazon-cloudwatch-agent
            systemctl enable httpd
            systemctl start httpd
            sleep 30
            SECONDS=0
            TIMEOUT=600  # 10 minutes
            until mysqladmin ping -h ${DBLab.Endpoint.Address} --silent; do
              if [ $SECONDS -ge $TIMEOUT ]; then
                echo "RDS not responding in 10 minutes, exiting"
                exit 1
                fi
            sleep 10
            done
            cd /var/www/html
            wget https://wordpress.org/latest.tar.gz
            tar -xzf latest.tar.gz --strip-components=1
            cat > wp-config.php <<EOF
            <?php
            define('DB_NAME', 'lab_wordpress');
            define('DB_USER', '${DBUsername}');
            define('DB_PASSWORD', '${DBPassword}');
            define('DB_HOST', '${DBLab.Endpoint.Address}');
            define('DB_CHARSET', 'utf8');
            define('DB_COLLATE', '');

            \$table_prefix = 'wp_';

            if ( !defined('ABSPATH') )
                define('ABSPATH', __DIR__ . '/');

            require_once ABSPATH . 'wp-settings.php';
            EOF
            chmod -R 755 /var/www/html
            chown -R apache:apache /var/www/html
            sed -i 's/AllowOverride None/AllowOverride All/' /etc/httpd/conf/httpd.conf
            rm -f /var/www/html/index.html
            systemctl restart httpd

  # ---------------- Auto Scaling Groups ----------------
  ASGProd:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplateProd
        Version: !GetAtt LaunchTemplateProd.LatestVersionNumber
      MinSize: 1
      MaxSize: 3
      DesiredCapacity: 2
      VPCZoneIdentifier:
        - !Ref PublicSubnetA
        - !Ref PublicSubnetB
      TargetGroupARNs:
        - !Ref TargetGroupProd
      HealthCheckType: ELB
      HealthCheckGracePeriod: 600

  ASGLab:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplateLab
        Version: !GetAtt LaunchTemplateLab.LatestVersionNumber
      MinSize: 1
      MaxSize: 2
      DesiredCapacity: 1
      VPCZoneIdentifier:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB
      TargetGroupARNs:
        - !Ref TargetGroupLab
      HealthCheckType: ELB
      HealthCheckGracePeriod: 600

  # ---------------- Scheduled Scaling for Lab ----------------
  LabScaleDown:
    Type: AWS::AutoScaling::ScheduledAction
    Properties:
      AutoScalingGroupName: !Ref ASGLab
      DesiredCapacity: 0
      MinSize: 0
      MaxSize: 0
      Recurrence: "0 22 * * *"

  LabScaleUp:
    Type: AWS::AutoScaling::ScheduledAction
    Properties:
      AutoScalingGroupName: !Ref ASGLab
      DesiredCapacity: 1
      MinSize: 1
      MaxSize: 2
      Recurrence: "0 13 * * *"

Outputs:
  ProdURL:
    Description: URL of the Prod WordPress site
    Value: !GetAtt ALBProd.DNSName

  LabURL:
    Description: Internal URL of the Lab WordPress site
    Value: !GetAtt ALBLab.DNSName